_BASE_: ../../muses/oneformer_R50_bs8_90k_muses.yaml

MODEL:
  META_ARCHITECTURE: "DGFusion"
  SEM_SEG_HEAD:
    NAME: "OneFormerHead"
    IGNORE_VALUE: 255
    NUM_CLASSES: 14
    LOSS_WEIGHT: 1.0
    CONVS_DIM: 256
    MASK_DIM: 256
    NORM: "GN"
    PIXEL_DECODER_NAME: "MSDeformAttnPixelDecoder"
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
    DEFORMABLE_TRANSFORMER_ENCODER_IN_FEATURES: ["res3", "res4", "res5"]
    COMMON_STRIDE: 4
    TRANSFORMER_ENC_LAYERS: 6
  ONE_FORMER:
    TRANSFORMER_IN_FEATURE: "multi_scale_pixel_decoder"
    DEEP_SUPERVISION: True
    NO_OBJECT_WEIGHT: 0.1
    CLASS_WEIGHT: 2.0
    MASK_WEIGHT: 5.0
    DICE_WEIGHT: 5.0
    CONTRASTIVE_WEIGHT: 0.5
    HIDDEN_DIM: 256
    NUM_OBJECT_QUERIES: 150
    SIZE_DIVISIBILITY: 32
    DEC_LAYERS: 10
    TRAIN_NUM_POINTS: 12544
    OVERSAMPLE_RATIO: 3.0
    IMPORTANCE_SAMPLE_RATIO: 0.75
  BACKBONE:
    NAME: "D2SwinTransformer"
  SWIN:
    EMBED_DIM: 96
    DEPTHS: [2, 2, 6, 2]
    NUM_HEADS: [3, 6, 12, 24]
    WINDOW_SIZE: 7
    APE: False
    DROP_PATH_RATE: 0.3
    PATCH_NORM: True
    PRETRAIN_IMG_SIZE: 224
  WEIGHTS: "../../data/dgfusion_swin_tiny_bs8_180k_muses_clre.pth"
  PIXEL_MEAN: [123.675, 116.280, 103.530]
  PIXEL_STD: [58.395, 57.120, 57.375]
  CONDITION_CLASSIFIER:
    ENABLED: True
    CONDITION_TEXT_ENTRIES: ["condition", "time_of_day", "precipitation_text", "ground_condition", "sun_level", "text"]
  FUSION:
    TYPE: "DepthTokenGuidedPCA"
    QC:
      CAT_QC_TO_QUERY: True
      CAT_QC_TO_KEY: False
      ENABLE_WEATHER_PROJ: True
    LEVELS: ["res5", "res4", "res3", "res2"]
  FEATURE_ADAPTER:
    ENABLED: True
    NAME: "MLPAdapterWithLearnableRatio"
  DEPTH_HEAD:
    NAME: "SemanticFPN"
    ENABLED: True
  TEST:
    DEPTH_ON: True
    SEMANTIC_ON: True
    INSTANCE_ON: False
    PANOPTIC_ON: False
    TASK: "semantic"

DATASETS:
  TRAIN: ("waymo_semantic_train",)
  TEST_SEMANTIC: ("waymo_semantic_val",)
  MODALITIES:
    MAIN_MODALITY: "CAMERA"
    ORDER: ["CAMERA", "LIDAR", "EVENT_CAMERA", "RADAR", "REF_IMAGE"]
    CAMERA:
      LOAD: True
    LIDAR:
      LOAD: True
      LOAD_PROJECTED: True
      DILATION:
        ENABLED: False
    EVENT_CAMERA:
      LOAD: True
    RADAR:
      LOAD: True
    REF_IMAGE:
      LOAD: False
  PIXEL_MEAN:
    LIDAR: [7.6631646, 9.861262, 0.23872735]
    EVENT_CAMERA: [0.12577528, 0.12728328, 0.0]
    RADAR: [3.5392952, 8.275344, 0.0]
  PIXEL_STD:
    LIDAR: [16.53752009, 23.13748461, 1.71006056]
    EVENT_CAMERA: [0.54420582, 0.47625199, 1.0]
    RADAR: [13.59349095, 18.27715183, 1.0]

INPUT:
  DATASET_MAPPER_NAME: "waymo_lidar_semantic"
  MIN_SIZE_TRAIN: (640,)
  MIN_SIZE_TRAIN_SAMPLING: "choice"
  MIN_SIZE_TEST: 640
  MAX_SIZE_TRAIN: 1280
  MAX_SIZE_TEST: 1280
  CROP:
    ENABLED: False
  SIZE_DIVISIBILITY: 32

TEST:
  EVAL_PERIOD: 5000
  DETECTIONS_PER_IMAGE: 150

SOLVER:
  IMS_PER_BATCH: 2
  CHECKPOINT_PERIOD: 5000
  MAX_ITER: 90000
  BASE_LR: 0.0001

SEED: 0
